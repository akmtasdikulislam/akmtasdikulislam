<svg xmlns="http://www.w3.org/2000/svg" width="800" height="60" viewBox="0 0 800 60">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
      .hi   { fill: #ffffff; font-family: 'Space Grotesk', Inter, sans-serif; font-size: 52px; font-weight: 700; }
      .name { font-family: 'Space Grotesk', Inter, sans-serif; font-size: 52px; font-weight: 700; fill: url(#nameGrad); }
      @media (prefers-color-scheme: light) {
        .hi { fill: #0d0d0d; }
      }
    </style>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#16ffb0"/>
      <stop offset="100%" stop-color="#10B77F"/>
    </linearGradient>
  </defs>
  <text x="0" y="54">
    <tspan class="hi">Hi, I’m </tspan><tspan class="name">Akm Tasdikul Islam</tspan>
  </text>
</svg>