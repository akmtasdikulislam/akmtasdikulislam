<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="800" height="260" viewBox="0 0 800 260">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&amp;display=swap');
      .title  { font-family: 'Space Grotesk', Inter, sans-serif; font-size: 16px; font-weight: 700; fill: #ffffff; }
      .body   { font-family: 'Space Grotesk', Inter, sans-serif; font-size: 13px; font-weight: 400; fill: #c9d1d9; }
      .accent { font-family: 'Space Grotesk', Inter, sans-serif; font-size: 12.5px; font-weight: 500; fill: #10B77F; }
      .divider { stroke: #1e3a2e; stroke-width: 1; }
      @media (prefers-color-scheme: light) {
        .title  { fill: #0d0d0d; }
        .body   { fill: #444444; }
        .divider { stroke: #c8e6d8; }
      }
    </style>
  </defs>

  <!-- Dividers -->
  <line x1="400" y1="0" x2="400" y2="260" class="divider"/>
  <line x1="0" y1="130" x2="800" y2="130" class="divider"/>

  <!-- ── Card 1: Education (top-left) ── -->
  <g transform="translate(0, 20)">
    <!-- Lucide GraduationCap icon inline with title -->
    <g transform="translate(0, 2)">
      <path d="M12 3L1 9l11 6 11-6-11-6z" stroke="#10B77F" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M5 12v5c3.6 2.4 10.4 2.4 14 0v-5" stroke="#10B77F" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <line x1="23" y1="9" x2="23" y2="14" stroke="#10B77F" stroke-width="1.8" stroke-linecap="round"/>
    </g>
    <text x="30" y="17" class="title">Education</text>
    <text x="0" y="45" class="body">CSE — Bangladesh University of Professionals</text>
    <text x="0" y="65" class="accent">3rd Semester · CGPA 3.67 · 2025 Batch</text>
  </g>

  <!-- ── Card 2: Location (top-right) ── -->
  <g transform="translate(424, 20)">
    <!-- Lucide MapPin -->
    <g transform="translate(0, 2)">
      <path d="M12 2a7 7 0 0 0-7 7c0 5 7 11 7 11s7-6 7-11a7 7 0 0 0-7-7z" stroke="#10B77F" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="12" cy="9" r="2.5" stroke="#10B77F" stroke-width="1.8" fill="none"/>
    </g>
    <text x="30" y="17" class="title">Location</text>
    <text x="0" y="45" class="body">Dhaka, Bangladesh</text>
    <text x="0" y="65" class="accent">Available for remote work</text>
  </g>

  <!-- ── Card 3: Specialization (bottom-left) ── -->
  <g transform="translate(0, 150)">
    <!-- Lucide Code2 -->
    <g transform="translate(0, 2)">
      <polyline points="17,17 22,12 17,7" stroke="#10B77F" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <polyline points="7,7 2,12 7,17" stroke="#10B77F" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <text x="30" y="17" class="title">Specialization</text>
    <text x="0" y="45" class="body">Full Stack Development</text>
    <text x="0" y="65" class="accent">MERN Stack &amp; n8n Automation</text>
  </g>

  <!-- ── Card 4: Experience (bottom-right) ── -->
  <g transform="translate(424, 150)">
    <!-- Lucide Zap -->
    <g transform="translate(0, 2)">
      <polygon points="13,2 3,14 12,14 11,22 21,10 12,10" stroke="#10B77F" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <text x="30" y="17" class="title">Experience</text>
    <text x="0" y="45" class="body">2+ Years</text>
    <text x="0" y="65" class="accent">Web Development &amp; Automation</text>
  </g>
</svg>
