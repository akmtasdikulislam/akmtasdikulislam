<svg xmlns="http://www.w3.org/2000/svg" width="800" height="130" viewBox="0 0 800 130">
  <defs>
    <style>
      .bg        { fill: #0d0d0d; }
      .pill-bg   { fill: none; stroke: #10B77F; stroke-width: 1.2; }
      .pill-text { fill: #ffffff; }
      .heading-w { fill: #ffffff; }
      .heading-g { fill: #10B77F; }
      .subtitle  { fill: #6b7280; }

      @media (prefers-color-scheme: light) {
        .bg        { fill: #ffffff; }
        .pill-text { fill: #0d0d0d; }
        .heading-w { fill: #0d0d0d; }
        .subtitle  { fill: #6b7280; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="130" class="bg"/>

  <!-- Pill: centered, tight padding -->
  <!-- Content width: circle(10) + gap(6) + text ~82px = ~98px, pill width 140, x = (800-140)/2 = 330 -->
  <rect x="330" y="12" width="140" height="28" rx="14" ry="14" class="pill-bg"/>
  <!-- Dot: left-padded inside pill -->
  <circle cx="354" cy="26" r="4.5" fill="#10B77F"/>
  <!-- Text: tight after dot -->
  <text x="365" y="31" font-family="Inter, Segoe UI, sans-serif" font-size="11.5" font-weight="500" letter-spacing="1.8" class="pill-text">MY SKILLS</text>

  <!-- Main heading -->
  <text x="400" y="90" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="44" font-weight="700">
    <tspan class="heading-w">Tech </tspan><tspan class="heading-g">Expertise</tspan>
  </text>

  <!-- Subtitle -->
  <text x="400" y="118" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="13.5" font-weight="400" class="subtitle">I work with modern technologies to build scalable and efficient solutions</text>
</svg>
